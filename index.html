<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Our Memories · DM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--rose:#c4757f;--drose:#8a3f4a;--prose:#e8a8b0;--bg:#0a0406;--txt:#f0e0e3;--mut:#a0878c;--dim:#6a5256;--line:rgba(160,99,107,.15)}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',system-ui,sans-serif;color:var(--txt);background:#000;font-size:14px;-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 50% at 50% 0%,#3a1620 0%,transparent 60%),radial-gradient(ellipse 80% 50% at 50% 100%,#2a0e16 0%,transparent 60%),#050203}
#phone{position:relative;width:393px;height:852px;background:var(--bg);border-radius:52px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.85),0 0 0 2px #1a0b10,0 0 80px rgba(196,117,127,.15);display:flex;flex-direction:column;isolation:isolate}
@media(max-width:420px){body{background:var(--bg)}#phone{width:100%;height:100%;height:100dvh;border-radius:0;box-shadow:none}}
/* BG */
#bg{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
#bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% -10%,rgba(196,117,127,.28) 0%,transparent 55%),radial-gradient(ellipse at 50% 110%,rgba(138,63,74,.24) 0%,transparent 60%),radial-gradient(circle at 20% 40%,rgba(232,168,176,.05),transparent 40%)}
.heart{position:absolute;left:-80px;bottom:60px;width:420px;height:420px;opacity:.06;animation:float 9s ease-in-out infinite;filter:blur(.5px)}
@keyframes float{0%,100%{transform:translateY(0) rotate(-4deg) scale(1)}50%{transform:translateY(-24px) rotate(3deg) scale(1.03)}}
.shimmer{position:absolute;inset:0;background:linear-gradient(115deg,transparent 42%,rgba(232,168,176,.035) 50%,transparent 58%);animation:shim 11s linear infinite}
@keyframes shim{0%{transform:translateX(-200%)}100%{transform:translateX(200%)}}
.grain{position:absolute;inset:-50%;opacity:.09;mix-blend-mode:overlay;pointer-events:none}
/* Particles */
.p{position:absolute;border-radius:50%;background:radial-gradient(circle,#e8a8b0,transparent 70%);filter:blur(1.5px);animation:rise linear infinite;will-change:transform,opacity;pointer-events:none}
@keyframes rise{0%{transform:translateY(0) translateX(0);opacity:0}8%{opacity:.65}90%{opacity:.15}100%{transform:translateY(-900px) translateX(var(--dx,20px));opacity:0}}
/* App layout */
.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%}
/* Status bar */
.status{height:47px;display:flex;align-items:center;justify-content:space-between;padding:14px 28px 0;font-size:15px;font-weight:600;flex-shrink:0;color:#fff;letter-spacing:-.2px}
.status .rs{display:flex;align-items:center;gap:5px}
.batt{color:#4ade80;font-size:11px;font-weight:700;margin-right:1px}
/* Header */
.hdr{height:58px;display:flex;align-items:center;padding:0 10px;gap:9px;flex-shrink:0;background:rgba(10,4,6,.72);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:.5px solid var(--line);position:relative;z-index:2}
.icn{background:none;border:0;color:var(--txt);cursor:pointer;padding:7px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:transform .12s,background .2s}
.icn:active{transform:scale(.82);background:rgba(196,117,127,.12)}
.pfp{width:40px;height:40px;border-radius:50%;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;background:linear-gradient(135deg,#c4757f,#8a3f4a 50%,#4a1a24);box-shadow:0 2px 8px rgba(138,63,74,.4)}
.pfp::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(from 0deg,#e8a8b0,#c4757f,#8a3f4a,#e8a8b0);z-index:-1;animation:pulse 3s ease-in-out infinite;opacity:.7}
@keyframes pulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:.95;transform:scale(1.06)}}
.dot{position:absolute;right:-1px;bottom:-1px;width:12px;height:12px;border-radius:50%;background:#4ade80;border:2.5px solid var(--bg);box-shadow:0 0 8px rgba(74,222,128,.6)}
.uinfo{flex:1;min-width:0}
.uname{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:#fff;display:flex;align-items:center;gap:6px}
.hrt{color:var(--prose);font-size:14px;animation:heartbeat 1.6s ease-in-out infinite;display:inline-block}
@keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.22)}30%{transform:scale(1)}45%{transform:scale(1.14)}}
.sub{font-size:11px;color:var(--mut);margin-top:1px}
/* Tabs */
.tabs{display:flex;padding:0 12px;flex-shrink:0;position:relative;background:rgba(10,4,6,.5);border-bottom:.5px solid var(--line)}
.tab{flex:1;padding:11px 0;text-align:center;font-size:12.5px;font-weight:500;color:#7a5a60;cursor:pointer;transition:color .25s;background:none;border:0;font-family:inherit;letter-spacing:.2px;position:relative}
.tab.active{color:var(--prose)}
.tab:active{transform:scale(.96)}
.tind{position:absolute;bottom:0;height:2px;background:linear-gradient(90deg,var(--rose),var(--prose));transition:all .38s cubic-bezier(.5,1.5,.3,1);border-radius:2px;box-shadow:0 0 10px rgba(232,168,176,.4)}
/* Panels */
.panel{flex:1;overflow:hidden;display:none;flex-direction:column;min-height:0}
.panel.active{display:flex;animation:fadein .28s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
/* Search */
.search{padding:8px 12px;flex-shrink:0}
.sbox{display:flex;align-items:center;background:rgba(30,15,19,.65);border:.5px solid rgba(160,99,107,.22);border-radius:20px;padding:8px 13px;gap:9px;transition:border-color .2s,box-shadow .2s}
.sbox:focus-within{border-color:rgba(232,168,176,.5);box-shadow:0 0 0 3px rgba(232,168,176,.08)}
.sbox input{flex:1;background:none;border:0;color:var(--txt);font-size:13.5px;outline:0;font-family:inherit;min-width:0}
.sbox input::placeholder{color:var(--dim)}
.sres{font-size:11px;color:var(--mut);white-space:nowrap;margin-left:4px}
.clr{background:rgba(160,99,107,.2);border:0;color:var(--txt);cursor:pointer;font-size:10px;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center;flex-shrink:0}
.clr.show{display:flex}
/* Messages */
#msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 12px 16px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
#msgs::-webkit-scrollbar{width:0}
.ds{text-align:center;font-size:10px;color:#7a5a5f;margin:18px 0 10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;position:relative}
.ds::before,.ds::after{content:'';position:absolute;top:50%;width:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(160,99,107,.2))}
.ds::before{left:10%}.ds::after{right:10%;background:linear-gradient(-90deg,transparent,rgba(160,99,107,.2))}
.tg{text-align:center;font-size:10px;color:#6a4a4f;margin:12px 0 4px;letter-spacing:.3px}
.row{display:flex;margin-bottom:2px;position:relative;contain:layout style}
@keyframes fu{from{opacity:0;transform:translateY(9px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.row.s{justify-content:flex-end}
.row.r{justify-content:flex-start}
.row.gap{margin-top:8px}
.bub{max-width:76%;padding:9px 14px;font-size:14px;line-height:1.42;border-radius:22px;position:relative;cursor:pointer;word-wrap:break-word;white-space:pre-wrap;transition:transform .12s,filter .12s;letter-spacing:.1px}
.bub:active{transform:scale(.96)}
.s .bub{background:linear-gradient(135deg,#d4848e 0%,#b56470 55%,#944055 100%);color:#fff;box-shadow:0 2px 12px rgba(148,64,85,.3),inset 0 1px 0 rgba(255,255,255,.08)}
.r .bub{background:linear-gradient(135deg,rgba(30,14,18,.88),rgba(22,8,11,.82));border:.5px solid rgba(160,99,107,.22);backdrop-filter:blur(14px);color:var(--txt);box-shadow:0 2px 10px rgba(0,0,0,.3)}
.s .bub.top{border-bottom-right-radius:6px}
.s .bub.mid{border-top-right-radius:6px;border-bottom-right-radius:6px}
.s .bub.bot{border-top-right-radius:6px}
.r .bub.top{border-bottom-left-radius:6px}
.r .bub.mid{border-top-left-radius:6px;border-bottom-left-radius:6px}
.r .bub.bot{border-top-left-radius:6px}
.att{position:relative;overflow:hidden;background:rgba(255,255,255,.05)!important;border:.5px solid rgba(160,99,107,.3)!important}
.atag{font-size:11px;margin-top:6px;display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(0,0,0,.25);border-radius:8px;font-weight:500;opacity:.85}
.rx{position:absolute;bottom:-13px;background:#1a0b10;border:1.5px solid var(--bg);border-radius:14px;padding:2px 7px;font-size:12px;animation:rpop .5s cubic-bezier(.4,1.7,.5,1) both;animation-delay:.15s;box-shadow:0 2px 8px rgba(0,0,0,.5);z-index:2}
.s .rx{right:10px}.r .rx{left:10px}
@keyframes rpop{0%{transform:scale(0) rotate(-20deg);opacity:0}65%{transform:scale(1.2) rotate(4deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.tip{position:absolute;bottom:calc(100% + 4px);font-size:10px;color:var(--mut);opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;background:rgba(18,6,10,.92);padding:3px 8px;border-radius:8px;border:.5px solid var(--line)}
.s .tip{right:6px}.r .tip{left:6px}
.bub:hover .tip{opacity:1}
/* Jump btn */
.jump{position:absolute;bottom:72px;right:14px;width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#c4757f,#8a3f4a);border:0;color:#fff;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(138,63,74,.55),0 0 0 1px rgba(232,168,176,.2);z-index:5;font-size:16px}
.jump.show{display:flex;animation:jpop .45s cubic-bezier(.4,1.7,.5,1) forwards}
@keyframes jpop{0%{transform:scale(0) translateY(16px)}65%{transform:scale(1.12) translateY(-2px)}100%{transform:scale(1) translateY(0)}}
/* Input bar */
.input{min-height:54px;display:flex;align-items:center;padding:8px 10px;gap:8px;border-top:.5px solid var(--line);flex-shrink:0;background:rgba(10,4,6,.75);backdrop-filter:blur(20px)}
.cam{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#c4757f,#8a3f4a);display:flex;align-items:center;justify-content:center;color:#fff;border:0;flex-shrink:0;cursor:pointer;box-shadow:0 3px 10px rgba(138,63,74,.4)}
.cam:active{transform:scale(.9)}
.ifield{flex:1;background:rgba(30,15,19,.6);border:.5px solid rgba(160,99,107,.2);border-radius:22px;padding:9px 14px;color:var(--txt);font-size:13.5px;display:flex;align-items:center;justify-content:space-between;gap:10px;min-width:0}
.ifield .pl{color:var(--dim)}
.iicns{display:flex;gap:14px;color:var(--mut);flex-shrink:0}
.iicns svg{width:18px;height:18px;cursor:pointer;transition:transform .15s,opacity .15s;opacity:.8}
.iicns svg:active{transform:scale(.82);opacity:1}
.home{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(255,255,255,.55);border-radius:3px;z-index:3}
@media(max-width:420px){.home{display:none}}
/* Splash */
#splash{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a0810 0%,#050203 70%);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.4,0,.2,1)}
#splash.hide{opacity:0;transform:scale(1.12);pointer-events:none}
.shrt{font-size:70px;filter:drop-shadow(0 0 32px rgba(232,168,176,.65));animation:hb 1.4s ease-in-out infinite}
@keyframes hb{0%,100%{transform:scale(1)}15%{transform:scale(1.2)}30%{transform:scale(.95)}45%{transform:scale(1.12)}60%{transform:scale(1)}}
.stit{font-family:'Playfair Display',serif;font-size:36px;color:var(--prose);font-weight:600;letter-spacing:1.5px;font-style:italic;text-shadow:0 0 40px rgba(232,168,176,.3);text-align:center}
.ssub{font-size:10px;color:#8a6b70;letter-spacing:3px;text-transform:uppercase;font-weight:500;text-align:center}
.pbar{width:200px;height:2px;background:rgba(160,99,107,.18);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--rose),var(--prose));width:0%;transition:width .35s ease;box-shadow:0 0 10px rgba(232,168,176,.5)}
.sload{font-size:10px;color:#5a4045;letter-spacing:2px;text-transform:uppercase;margin-top:-6px}
/* Stats panel */
#stats-panel{overflow-y:auto;padding:12px;height:100%}
#stats-panel::-webkit-scrollbar{width:0}
.card{background:linear-gradient(135deg,rgba(30,14,18,.7),rgba(22,8,11,.6));border:.5px solid rgba(160,99,107,.18);border-radius:18px;padding:14px 16px;margin-bottom:10px;animation:fu .5s cubic-bezier(.2,.9,.3,1) both;backdrop-filter:blur(10px)}
.card:nth-child(1){animation-delay:0s}.card:nth-child(2){animation-delay:.05s}.card:nth-child(3){animation-delay:.1s}.card:nth-child(4){animation-delay:.15s}.card:nth-child(5){animation-delay:.2s}.card:nth-child(6){animation-delay:.25s}.card:nth-child(7){animation-delay:.3s}
.clbl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:600}
.cval{font-family:'Playfair Display',serif;font-size:30px;color:var(--prose);font-weight:600;line-height:1}
.csub{font-size:11px;color:var(--mut);margin-top:4px}
.splt{margin-top:10px}
.sp{margin-bottom:10px}
.sp:last-child{margin-bottom:0}
.sp .lb{font-size:11.5px;color:var(--txt);margin-bottom:5px;display:flex;justify-content:space-between;font-weight:500}
.sp .lb span:last-child{color:var(--prose);font-weight:600}
.sbar{height:7px;background:rgba(160,99,107,.12);border-radius:4px;overflow:hidden}
.sfl{height:100%;background:linear-gradient(90deg,var(--rose),var(--prose));border-radius:4px;width:0;transition:width 1.2s cubic-bezier(.3,.9,.3,1) .3s;box-shadow:0 0 8px rgba(232,168,176,.3)}
.sfl.alt{background:linear-gradient(90deg,#8a3f4a,#c4757f)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{background:linear-gradient(135deg,rgba(196,117,127,.18),rgba(138,63,74,.12));border:.5px solid rgba(196,117,127,.28);color:var(--prose);padding:4px 11px;border-radius:14px;font-size:12px;font-weight:500;animation:fu .4s both}
.chip b{color:#fff;margin-left:4px;opacity:.65;font-weight:400;font-size:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.grid2 .card{margin-bottom:0}
.dow{display:flex;gap:4px;margin-top:12px;align-items:flex-end;height:62px;padding-bottom:18px;position:relative}
.dbar{flex:1;background:linear-gradient(180deg,var(--prose),var(--rose));border-radius:3px 3px 0 0;position:relative;min-height:3px;transition:height 1s cubic-bezier(.3,.9,.3,1) .4s}
.dbar::after{content:attr(data-d);position:absolute;bottom:-17px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--mut);font-weight:600;letter-spacing:.3px}
.dbar.mx{background:linear-gradient(180deg,#fff8fc,var(--prose))}
/* Media panel */
#media-panel{overflow-y:auto;padding:12px;height:100%}
#media-panel::-webkit-scrollbar{width:0}
.mcnt{font-size:11px;color:var(--mut);margin-bottom:10px;text-transform:uppercase;letter-spacing:1.2px;font-weight:600}
.mgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.mcell{aspect-ratio:1;background:linear-gradient(135deg,rgba(30,14,18,.9),rgba(22,8,11,.7));border:.5px solid rgba(160,99,107,.25);border-radius:10px;padding:8px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;overflow:hidden;animation:fu .4s both;position:relative;transition:transform .15s,box-shadow .15s}
.mcell:active{transform:scale(.95)}
.mcell:hover{box-shadow:0 0 0 1px rgba(232,168,176,.3)}
.mcell::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% 30%,rgba(196,117,127,.12),transparent 60%);pointer-events:none}
.mic{font-size:22px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.mcp{font-size:10px;color:#c0a8ac;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;position:relative;z-index:1}
/* Bottom sheet */
.sheet{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:50;display:none;align-items:flex-end;backdrop-filter:blur(6px)}
.sheet.show{display:flex;animation:fadein .25s ease}
.sinner{width:100%;background:linear-gradient(180deg,#1e0b12,#0f0609);border-top-left-radius:26px;border-top-right-radius:26px;padding:10px 20px 28px;max-height:72%;overflow-y:auto;animation:slideup .42s cubic-bezier(.3,1.3,.4,1);border-top:.5px solid rgba(196,117,127,.2);box-shadow:0 -10px 40px rgba(0,0,0,.6)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sgrip{width:42px;height:4px;background:rgba(160,99,107,.3);border-radius:2px;margin:0 auto 16px;cursor:pointer}
.shd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.shn{font-family:'Playfair Display',serif;font-size:17px;color:var(--prose);font-weight:600}
.sht{font-size:15px;color:var(--txt);line-height:1.58;white-space:pre-wrap;word-wrap:break-word}
.sd{font-size:11px;color:var(--mut);margin-top:14px;padding-top:12px;border-top:.5px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.srxn{font-size:22px;margin-top:10px;display:inline-block;animation:rpop .4s cubic-bezier(.4,1.7,.5,1) both}
.scls{background:linear-gradient(135deg,rgba(196,117,127,.2),rgba(138,63,74,.15));border:.5px solid rgba(196,117,127,.3);color:var(--prose);padding:6px 18px;border-radius:14px;font-size:13px;cursor:pointer;font-family:inherit;border-width:.5px}
.scls:active{transform:scale(.96)}
/* Highlight */
.hl{background:rgba(232,168,176,.38);border-radius:3px;padding:0 2px;color:#fff;font-weight:600}
/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--mut);font-size:13px}
.empty .eh{font-size:44px;margin-bottom:14px;opacity:.35}

/* ── CALENDAR JUMP ── */
.cal-btn{background:linear-gradient(135deg,rgba(196,117,127,.2),rgba(138,63,74,.12));border:.5px solid rgba(196,117,127,.35);color:var(--prose);padding:5px 12px;border-radius:14px;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:background .2s,transform .12s;flex-shrink:0}
.cal-btn:active{transform:scale(.93)}
.cal-sheet{position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:60;display:none;align-items:flex-end;backdrop-filter:blur(8px)}
.cal-sheet.show{display:flex;animation:fadein .22s ease}
.cal-inner{width:100%;background:linear-gradient(180deg,#1e0b12,#0f0609);border-top-left-radius:26px;border-top-right-radius:26px;padding:14px 16px 30px;animation:slideup .38s cubic-bezier(.3,1.3,.4,1);border-top:.5px solid rgba(196,117,127,.2)}
.cal-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--prose);text-align:center;margin-bottom:14px;font-weight:600}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-nav button{background:none;border:0;color:var(--mut);cursor:pointer;font-size:18px;padding:4px 10px;border-radius:10px;transition:color .15s,background .15s}
.cal-nav button:hover{color:var(--prose);background:rgba(196,117,127,.1)}
.cal-month{font-size:13px;color:var(--txt);font-weight:600;letter-spacing:.5px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:9px;color:var(--dim);text-align:center;padding:2px 0;letter-spacing:.5px;font-weight:700}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;cursor:pointer;transition:background .15s,transform .12s;position:relative}
.cal-day:empty{cursor:default}
.cal-day.active-day{background:rgba(196,117,127,.15);color:var(--txt)}
.cal-day.active-day:hover{background:rgba(196,117,127,.28);transform:scale(1.08)}
.cal-day.has-msgs::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--rose);opacity:.7}
.cal-day.inactive{color:var(--dim);cursor:default;opacity:.3}
.cal-day.today-day{border:.5px solid rgba(232,168,176,.4)}
.cal-day.selected{background:linear-gradient(135deg,var(--rose),var(--drose))!important;color:#fff!important;box-shadow:0 2px 8px rgba(196,117,127,.4)}
.cal-day.high-day{background:rgba(196,117,127,.22)}

/* ── HIGHLIGHT CARDS (first msg, best day) ── */
.hcard{background:linear-gradient(135deg,rgba(196,117,127,.15),rgba(138,63,74,.08));border:.5px solid rgba(196,117,127,.3);border-radius:18px;padding:14px 16px;margin-bottom:10px;position:relative;overflow:hidden;animation:fu .5s cubic-bezier(.2,.9,.3,1) both}
.hcard::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(232,168,176,.12),transparent 70%);pointer-events:none}
.hcard-icon{font-size:28px;margin-bottom:6px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3))}
.hcard-lbl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;font-weight:600}
.hcard-val{font-family:'Playfair Display',serif;font-size:18px;color:var(--prose);font-weight:600;line-height:1.25}
.hcard-sub{font-size:11px;color:var(--mut);margin-top:4px;line-height:1.4}
.hcard-quote{font-size:13px;color:var(--txt);line-height:1.5;font-style:italic;margin-top:6px;padding:8px 12px;background:rgba(0,0,0,.25);border-radius:10px;border-left:2px solid var(--rose)}
.hcard-btn{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;color:var(--rose);cursor:pointer;background:none;border:0;font-family:inherit;padding:0;transition:opacity .15s}
.hcard-btn:active{opacity:.6}
.grid2h{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.grid2h .hcard{margin-bottom:0}

/* ── STREAK ── */
.streak-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.streak-num{font-family:'Playfair Display',serif;font-size:40px;color:var(--prose);font-weight:700;line-height:1}
.streak-info{flex:1}
.streak-label{font-size:12px;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.streak-sub{font-size:11px;color:var(--mut);margin-top:2px}
.flame{font-size:30px;animation:heartbeat 1.6s ease-in-out infinite;display:inline-block}

/* ── MOOD TIMELINE ── */
.mood-chart{margin-top:12px;position:relative;height:72px;display:flex;align-items:flex-end;gap:2px}
.mood-bar{flex:1;border-radius:3px 3px 0 0;min-height:3px;position:relative;cursor:pointer;transition:opacity .15s,filter .15s}
.mood-bar:hover{opacity:.8;filter:brightness(1.2)}
.mood-bar .mood-tip{position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);white-space:nowrap;font-size:9px;color:var(--txt);background:rgba(18,6,10,.95);padding:3px 7px;border-radius:7px;border:.5px solid var(--line);opacity:0;pointer-events:none;transition:opacity .2s;z-index:5}
.mood-bar:hover .mood-tip{opacity:1}
.mood-xlabels{display:flex;justify-content:space-between;margin-top:4px;padding:0 1px}
.mood-xl{font-size:9px;color:var(--dim);font-weight:600}
.mood-legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.mood-leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mut)}
.mood-leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── HEATMAP ── */
.heat-grid{display:grid;grid-template-columns:repeat(24,1fr);gap:2px;margin-top:12px}
.heat-cell{aspect-ratio:1;border-radius:2px;transition:transform .12s,box-shadow .12s;cursor:pointer;position:relative}
.heat-cell:hover{transform:scale(1.3);box-shadow:0 0 6px rgba(232,168,176,.4);z-index:2}
.heat-cell .heat-tip{position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);white-space:nowrap;font-size:9px;color:var(--txt);background:rgba(18,6,10,.95);padding:3px 7px;border-radius:7px;border:.5px solid var(--line);opacity:0;pointer-events:none;transition:opacity .2s;z-index:5}
.heat-cell:hover .heat-tip{opacity:1}
.heat-xlabels{display:flex;justify-content:space-between;margin-top:3px}
.heat-xl{font-size:8px;color:var(--dim);font-weight:600}
</style>

<script>
// ── CLOCK ──
(function tick(){
  const n=new Date();
  document.getElementById('clk').textContent=
    n.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  setTimeout(tick,1000);
})();

// ── PARTICLES ──
(function(){
  const box=document.getElementById('pbox');
  for(let i=0;i<16;i++){
    const p=document.createElement('div');p.className='p';
    const s=Math.random()*5+3;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:${Math.random()*25}%;animation-duration:${10+Math.random()*10}s;animation-delay:${Math.random()*12}s;--dx:${(Math.random()-.5)*60}px`;
    box.appendChild(p);
  }
})();

// ── DATA ──
const MY="\u531a\u5c3a7/\u5342\u4e02\u5343\u5342\u957f-(\ud83c\uddf3\ud83c\uddf5)";
let ALL=[];

function parseTS(ts){try{return new Date(ts);}catch{return new Date(0);}}
function fmtDate(d){
  const now=new Date(),
    tod=new Date(now.getFullYear(),now.getMonth(),now.getDate()),
    yes=new Date(tod-864e5),
    md=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  if(+md===+tod)return'Today';
  if(+md===+yes)return'Yesterday';
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}
function fmtTime(d){return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});}

// ── RENDER ──
// Build a single message row element (no animation delay for perf)
function buildRow(m,i,msgs,q,lastState){
  const sent=m.s===MY,ts=parseTS(m.ts),dstr=fmtDate(ts),next=msgs[i+1];
  const nodes=[];

  if(dstr!==lastState.date){
    const d=document.createElement('div');d.className='ds';d.textContent=dstr;
    nodes.push(d);lastState.date=dstr;lastState.s='';lastState.ts=null;
  }
  if(lastState.ts&&(ts-lastState.ts)>27e5){
    const t=document.createElement('div');t.className='tg';t.textContent=fmtTime(ts);
    nodes.push(t);lastState.s='';
  }
  const sameP=m.s===lastState.s;
  const sameN=next&&next.s===m.s&&fmtDate(parseTS(next.ts))===dstr;
  let sh='';
  if(!sameP&&sameN)sh='top';
  else if(sameP&&sameN)sh='mid';
  else if(sameP&&!sameN)sh='bot';

  const row=document.createElement('div');
  row.className='row '+(sent?'s':'r')+(sameP?'':' gap');

  const bub=document.createElement('div');
  bub.className='bub'+(sh?' '+sh:'')+(m.a?' att':'');

  if(m.a){
    const cap=m.t.replace(/You sent an attachment\.?/gi,'').replace(/Instagram user sent an attachment\.?/gi,'').trim();
    if(cap){const c=document.createElement('div');c.style.cssText='font-size:13px;line-height:1.4;margin-bottom:4px;';c.textContent=cap.slice(0,160);bub.appendChild(c);}
    const tag=document.createElement('span');tag.className='atag';
    tag.textContent=(cap?'🎞 Reel / Post':'📎 Attachment');bub.appendChild(tag);
  } else if(m.t){
    if(q){
      const esc=m.t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
      bub.innerHTML=esc.replace(re,'<span class="hl">$1</span>');
    } else {
      bub.textContent=m.t;
    }
  } else {
    bub.textContent='…';
  }

  const tip=document.createElement('div');tip.className='tip';tip.textContent=fmtTime(ts);
  bub.appendChild(tip);
  if(m.r){const rx=document.createElement('div');rx.className='rx';rx.textContent=m.r;bub.appendChild(rx);}
  bub.addEventListener('click',()=>openSheet(m,ts,sent));
  row.appendChild(bub);
  nodes.push(row);

  lastState.s=m.s;lastState.ts=ts;
  return nodes;
}

// Chunked render — appends CHUNK_SIZE rows per animation frame so the
// browser never blocks and scrolling stays silky.
const CHUNK=200;
let renderToken=0; // cancel stale renders on new search

function render(msgs,q=''){
  const wrap=document.getElementById('msgs');
  wrap.innerHTML='';
  renderToken++;
  const token=renderToken;

  if(!msgs.length){
    wrap.innerHTML='<div class="empty"><div class="eh">&#x1F50D;</div>No messages found</div>';
    document.getElementById('sres').textContent='0 msgs';return;
  }
  document.getElementById('sres').textContent=msgs.length.toLocaleString()+' msgs';

  const inner=document.createElement('div');
  wrap.appendChild(inner);

  const state={date:'',s:'',ts:null};
  let idx=0;

  function flush(){
    if(renderToken!==token)return; // superseded
    const end=Math.min(idx+CHUNK,msgs.length);
    const frag=document.createDocumentFragment();
    for(;idx<end;idx++){
      buildRow(msgs[idx],idx,msgs,q,state).forEach(n=>frag.appendChild(n));
    }
    inner.appendChild(frag);
    if(idx<msgs.length){
      requestAnimationFrame(flush);
    }
  }
  requestAnimationFrame(flush);
}

// ── SEARCH ──
let curQ='',searchTimer=0;
document.getElementById('sq').addEventListener('input',function(){
  curQ=this.value.trim().toLowerCase();
  document.getElementById('clr').classList.toggle('show',!!curQ);
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    const f=curQ?ALL.filter(m=>m.t&&m.t.toLowerCase().includes(curQ)):ALL;
    render(f,curQ);
    if(!curQ)setTimeout(scrollBot,80);
  },120);
});
function clearSearch(){
  document.getElementById('sq').value='';curQ='';
  document.getElementById('clr').classList.remove('show');
  render(ALL);setTimeout(scrollBot,80);
}

// ── SCROLL / JUMP ──
// scrollBot polls until content has fully rendered before jumping
function scrollBot(){
  const w=document.getElementById('msgs');
  let last=-1,tries=0;
  function attempt(){
    if(w.scrollHeight!==last){last=w.scrollHeight;w.scrollTop=w.scrollHeight;}
    if(tries++<25)requestAnimationFrame(attempt);
  }
  attempt();
}
const msgsEl=document.getElementById('msgs'),jumpBtn=document.getElementById('jump');
msgsEl.addEventListener('scroll',()=>{
  const far=msgsEl.scrollHeight-msgsEl.scrollTop-msgsEl.clientHeight>320;
  if(far&&!jumpBtn.classList.contains('show')){jumpBtn.classList.add('show');}
  else if(!far){jumpBtn.classList.remove('show');}
});

// ── SHEET ──
function openSheet(m,ts,sent){
  document.getElementById('shn').textContent=sent?'You (cr7 🇳🇵)':'Her ♥';
  document.getElementById('sht').textContent=m.t||'(attachment)';
  document.getElementById('sdt').textContent=fmtDate(ts)+' · '+fmtTime(ts);
  document.getElementById('sdir').textContent=sent?'Sent ↗':'Received ↙';
  const rxEl=document.getElementById('srxn');
  rxEl.innerHTML=m.r?`<span class="srxn">${m.r}</span>`:'';
  document.getElementById('sheet').classList.add('show');
}
function closeSheet(e){if(e.target===document.getElementById('sheet'))closeSheetBtn();}
function closeSheetBtn(){document.getElementById('sheet').classList.remove('show');}

// ── TABS ──
let builtStats=false,builtMedia=false;
const tabBtns=document.querySelectorAll('.tab');
const tind=document.getElementById('tind');

function posInd(){
  const active=document.querySelector('.tab.active');
  if(!active)return;
  tind.style.left=active.offsetLeft+'px';
  tind.style.width=active.offsetWidth+'px';
}
tabBtns.forEach(btn=>{
  btn.addEventListener('click',function(){
    tabBtns.forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    posInd();
    const t=this.dataset.t;
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+t).classList.add('active');
    document.getElementById('jump').style.display=t==='msgs'?'':'none';
    if(t==='stats'&&!builtStats){builtStats=true;buildStats();}
    if(t==='media'&&!builtMedia){builtMedia=true;buildMedia();}
  });
});
setTimeout(posInd,100);

// ── STATS ──
function buildStats(){
  const panel=document.getElementById('stats-panel');
  const mine=ALL.filter(m=>m.s===MY).length;
  const hers=ALL.length-mine;
  const atts=ALL.filter(m=>m.a).length;
  const rxns=ALL.filter(m=>m.r).length;

  // Days chatted
  const dayMap={};
  ALL.forEach(m=>{try{const k=new Date(m.ts).toDateString();dayMap[k]=(dayMap[k]||0)+1;}catch{}});
  const days=Object.keys(dayMap).length;
  const avg=(ALL.length/Math.max(days,1)).toFixed(0);

  // Best day
  let bestDay='',bestCount=0;
  Object.entries(dayMap).forEach(([k,v])=>{if(v>bestDay||v>bestCount){bestCount=v;bestDay=k;}});
  const bestDayFmt=new Date(bestDay).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  // First message
  const firstMsg=ALL.find(m=>m.t&&!m.a);
  const firstTS=firstMsg?parseTS(firstMsg.ts):null;
  const firstFmt=firstTS?firstTS.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'';

  // Day of week
  const DOW={Sun:0,Mon:0,Tue:0,Wed:0,Thu:0,Fri:0,Sat:0};
  ALL.forEach(m=>{try{const d=new Date(m.ts);const k=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];DOW[k]++;}catch{}});
  const maxDow=Math.max(...Object.values(DOW));

  // Word freq
  const STOP=new Set(['that','this','with','have','from','they','will','your','what','just','been','were','when','then','than','into','more','also','like','said','over','some','time','very','only','make','know','take','come','even','about','there','their','would','could','should','which','after','before','again']);
  const wf={};
  ALL.forEach(m=>{
    if(!m.t||m.a)return;
    m.t.toLowerCase().split(/\s+/).forEach(w=>{
      w=w.replace(/[^a-z]/g,'');
      if(w.length>3&&!STOP.has(w))wf[w]=(wf[w]||0)+1;
    });
  });
  const topW=Object.entries(wf).sort((a,b)=>b[1]-a[1]).slice(0,12);

  // ── STREAK ──
  const sortedDays=Object.keys(dayMap).map(k=>new Date(k)).sort((a,b)=>a-b);
  let maxStreak=1,curStreak=1,currentRun=1;
  for(let i=1;i<sortedDays.length;i++){
    const diff=(sortedDays[i]-sortedDays[i-1])/(1000*60*60*24);
    if(Math.round(diff)===1){curStreak++;maxStreak=Math.max(maxStreak,curStreak);}
    else{curStreak=1;}
  }
  // current streak from last date
  const lastDate=sortedDays[sortedDays.length-1];
  const today=new Date();today.setHours(0,0,0,0);
  let runStreak=1;
  for(let i=sortedDays.length-1;i>0;i--){
    const diff=Math.round((sortedDays[i]-sortedDays[i-1])/(1000*60*60*24));
    if(diff===1)runStreak++;else break;
  }

  // ── MOOD TIMELINE (weekly energy: msgs/day avg per week) ──
  const weekMap={};
  ALL.forEach(m=>{
    try{
      const d=new Date(m.ts);
      const dayOfYear=Math.floor((d-new Date(d.getFullYear(),0,0))/(1000*60*60*24));
      const wk=Math.floor(dayOfYear/7);
      const key=d.getFullYear()+'w'+wk;
      weekMap[key]=weekMap[key]||{count:0,days:new Set(),date:d};
      weekMap[key].count++;
      weekMap[key].days.add(d.toDateString());
    }catch{}
  });
  const weekKeys=Object.keys(weekMap).sort();
  const maxWeekCount=Math.max(...weekKeys.map(k=>weekMap[k].count));

  // ── HOURLY HEATMAP ──
  const hourData=Array(24).fill(0);
  ALL.forEach(m=>{try{hourData[new Date(m.ts).getHours()]++;}catch{}});
  const maxHour=Math.max(...hourData);
  const peakHour=hourData.indexOf(maxHour);
  const peakFmt=new Date(2000,0,1,peakHour).toLocaleTimeString('en-US',{hour:'numeric',hour12:true});

  panel.innerHTML=`
    <div class="card">
      <div class="clbl">Total Messages</div>
      <div class="cval">${ALL.length.toLocaleString()}</div>
      <div class="csub">Across ${days} days &bull; ${avg} avg/day</div>
      <div class="splt" style="margin-top:14px">
        <div class="sp">
          <div class="lb"><span>cr7 &#x1F1F3;&#x1F1F5; (You)</span><span>${mine.toLocaleString()} (${(mine/ALL.length*100).toFixed(0)}%)</span></div>
          <div class="sbar"><div class="sfl" data-w="${(mine/ALL.length*100).toFixed(1)}"></div></div>
        </div>
        <div class="sp">
          <div class="lb"><span>Her &#x2665;</span><span>${hers.toLocaleString()} (${(hers/ALL.length*100).toFixed(0)}%)</span></div>
          <div class="sbar"><div class="sfl alt" data-w="${(hers/ALL.length*100).toFixed(1)}"></div></div>
        </div>
      </div>
    </div>

    <div class="grid2">
      <div class="card"><div class="clbl">Days Chatted</div><div class="cval">${days}</div></div>
      <div class="card"><div class="clbl">Avg / Day</div><div class="cval">${avg}</div></div>
      <div class="card"><div class="clbl">Reactions</div><div class="cval">${rxns}</div></div>
      <div class="card"><div class="clbl">Media Shared</div><div class="cval">${atts}</div></div>
    </div>

    <!-- HIGHLIGHT CARDS -->
    <div class="hcard" style="animation-delay:.05s">
      <div class="hcard-icon">&#x1F4DC;</div>
      <div class="hcard-lbl">First Message</div>
      <div class="hcard-val">${firstFmt}</div>
      ${firstMsg?`<div class="hcard-quote">"${firstMsg.t.slice(0,90)}${firstMsg.t.length>90?'…':''}"</div>`:''}
      <div class="hcard-sub">Sent by ${firstMsg&&firstMsg.s===MY?'you':'her'} &bull; ${Math.round((new Date()-firstTS)/(1000*60*60*24))} days ago</div>
      <button class="hcard-btn" onclick="jumpToMsg('${firstMsg?firstMsg.ts:''}')">&#x1F4C5; Jump to first message &rarr;</button>
    </div>

    <div class="hcard" style="animation-delay:.1s">
      <div class="hcard-icon">&#x1F31F;</div>
      <div class="hcard-lbl">Best Day Together</div>
      <div class="hcard-val">${bestDayFmt}</div>
      <div class="hcard-sub">${bestCount.toLocaleString()} messages in one day &bull; ${(bestCount/ALL.length*100).toFixed(1)}% of all messages</div>
      <button class="hcard-btn" onclick="jumpToDate('${bestDay}')">&#x1F4AC; View that day &rarr;</button>
    </div>

    <!-- STREAK -->
    <div class="card" style="animation-delay:.12s">
      <div class="clbl">Conversation Streak</div>
      <div class="streak-row">
        <span class="flame">&#x1F525;</span>
        <div class="streak-num">${maxStreak}</div>
        <div class="streak-info">
          <div class="streak-label">Day record streak</div>
          <div class="streak-sub">Current run: ${runStreak} day${runStreak!==1?'s':''} &bull; Best: ${maxStreak} days in a row</div>
        </div>
      </div>
    </div>

    <!-- MOOD TIMELINE -->
    <div class="card" style="animation-delay:.15s">
      <div class="clbl">Conversation Energy &bull; Weekly</div>
      <div class="mood-chart" id="mood-chart">
        ${weekKeys.map((k,i)=>{
          const wk=weekMap[k];
          const pct=Math.max(5,(wk.count/maxWeekCount*100));
          const d=new Date(wk.date);
          const lbl=d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
          const energy=pct>70?'🔥 High':pct>35?'💬 Active':'🌙 Quiet';
          const col=pct>70?'linear-gradient(180deg,#e8a8b0,#c4757f)':pct>35?'linear-gradient(180deg,#c4757f,#8a3f4a)':'linear-gradient(180deg,#6a4a4f,#3a1a22)';
          return `<div class="mood-bar" style="height:${pct}%;background:${col}" data-i="${i}"><div class="mood-tip">${lbl}: ${wk.count} msgs (${energy})</div></div>`;
        }).join('')}
      </div>
      <div class="mood-xlabels">
        <span class="mood-xl">${weekKeys.length?new Date(weekMap[weekKeys[0]].date).toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}</span>
        <span class="mood-xl">${weekKeys.length>1?new Date(weekMap[weekKeys[Math.floor(weekKeys.length/2)]].date).toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}</span>
        <span class="mood-xl">${weekKeys.length>1?new Date(weekMap[weekKeys[weekKeys.length-1]].date).toLocaleDateString('en-US',{month:'short',day:'numeric'}):''}</span>
      </div>
      <div class="mood-legend">
        <div class="mood-leg-item"><div class="mood-leg-dot" style="background:#e8a8b0"></div>High energy</div>
        <div class="mood-leg-item"><div class="mood-leg-dot" style="background:#c4757f"></div>Active</div>
        <div class="mood-leg-item"><div class="mood-leg-dot" style="background:#6a4a4f"></div>Quiet</div>
      </div>
    </div>

    <!-- HEATMAP -->
    <div class="card" style="animation-delay:.18s">
      <div class="clbl">Most Active Hour &bull; Peak: ${peakFmt} (${maxHour.toLocaleString()} msgs)</div>
      <div class="heat-grid" id="heat-grid">
        ${hourData.map((v,h)=>{
          const pct=maxHour?v/maxHour:0;
          const alpha=0.08+pct*0.75;
          const bg=`rgba(196,117,127,${alpha.toFixed(2)})`;
          const label=new Date(2000,0,1,h).toLocaleTimeString('en-US',{hour:'numeric',hour12:true});
          return `<div class="heat-cell" style="background:${bg}${h===peakHour?';box-shadow:0 0 5px rgba(232,168,176,.5)':''}" title="${label}"><div class="heat-tip">${label}: ${v.toLocaleString()}</div></div>`;
        }).join('')}
      </div>
      <div class="heat-xlabels">
        <span class="heat-xl">12a</span>
        <span class="heat-xl">6a</span>
        <span class="heat-xl">12p</span>
        <span class="heat-xl">6p</span>
        <span class="heat-xl">11p</span>
      </div>
    </div>

    <div class="card" style="animation-delay:.22s">
      <div class="clbl">Most Active Day</div>
      <div class="dow">
        ${Object.entries(DOW).map(([d,v])=>`<div class="dbar${v===maxDow?' mx':''}" data-d="${d}" style="height:${Math.max(4,(v/maxDow*100)).toFixed(0)}%" title="${v}"></div>`).join('')}
      </div>
    </div>
    <div class="card" style="animation-delay:.27s">
      <div class="clbl">Most Used Words</div>
      <div class="chips">${topW.map(([w,c],i)=>`<div class="chip" style="animation-delay:${i*.04}s">${w}<b>${c}</b></div>`).join('')}</div>
    </div>
  `;

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      panel.querySelectorAll('.sfl').forEach(b=>{b.style.width=b.dataset.w+'%';});
    });
  });
}

// ── MEDIA ──
function buildMedia(){
  const panel=document.getElementById('media-panel');
  const atts=ALL.filter(m=>m.a);
  if(!atts.length){panel.innerHTML='<div class="empty"><div class="eh">&#x1F3DE;</div>No media found</div>';return;}
  const cnt=document.createElement('div');cnt.className='mcnt';cnt.textContent=`${atts.length} shared items`;
  const grid=document.createElement('div');grid.className='mgrid';
  atts.forEach((m,i)=>{
    const cell=document.createElement('div');cell.className='mcell';cell.style.animationDelay=(i%18*.03)+'s';
    const cap=m.t.replace(/You sent an attachment\.?/gi,'').replace(/Instagram user sent an attachment\.?/gi,'').trim();
    cell.innerHTML=`<div class="mic">${cap?'&#x1F3DE;':'&#x1F4CE;'}</div><div class="mcp">${cap||'Attachment'}</div>`;
    const ts=parseTS(m.ts);
    cell.addEventListener('click',()=>openSheet(m,ts,m.s===MY));
    grid.appendChild(cell);
  });
  panel.appendChild(cnt);panel.appendChild(grid);
}

// ── LOAD ──
async function load(){
  const pf=document.getElementById('pfill');
  try{
    pf.style.width='18%';
    const r=await fetch('dm_data.json');
    pf.style.width='62%';
    ALL=await r.json();
    pf.style.width='92%';
    setTimeout(()=>{
      pf.style.width='100%';
      setTimeout(()=>{
        document.getElementById('splash').classList.add('hide');
        render(ALL);
        setTimeout(scrollBot,100);
      },500);
    },200);
  }catch(e){
    document.getElementById('splash').innerHTML=`
      <div style="color:var(--prose);text-align:center;padding:30px 20px;font-size:14px;line-height:1.8">
        &#x26A0; Could not load messages<br>
        <span style="font-size:11px;color:var(--mut)">Make sure dm_data.json is in the same folder<br>and open via GitHub Pages or a local server</span>
      </div>`;
  }
}
// ── CALENDAR ──
let calYear=0,calMonth=0,calDaySet=new Set(),calDayMap={};

function buildCalDayMap(){
  calDayMap={};calDaySet=new Set();
  ALL.forEach(m=>{
    try{
      const d=new Date(m.ts);
      const k=d.toDateString();
      calDaySet.add(k);
      calDayMap[k]=(calDayMap[k]||0)+1;
    }catch{}
  });
}

function openCal(){
  if(!calDaySet.size)buildCalDayMap();
  const now=new Date();
  calYear=now.getFullYear();calMonth=now.getMonth();
  renderCal();
  document.getElementById('cal-sheet').classList.add('show');
}
function closeCal(e){
  if(!e||e.target===document.getElementById('cal-sheet'))
    document.getElementById('cal-sheet').classList.remove('show');
}
function calPrev(){if(calMonth===0){calMonth=11;calYear--;}else{calMonth--;}renderCal();}
function calNext(){if(calMonth===11){calMonth=0;calYear++;}else{calMonth++;}renderCal();}

function renderCal(){
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];
  document.getElementById('cal-month-lbl').textContent=MONTHS[calMonth]+' '+calYear;
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  DAYS.forEach(d=>{const el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);});
  const first=new Date(calYear,calMonth,1).getDay();
  const total=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  const maxC=Math.max(...Object.values(calDayMap)||[1]);
  for(let i=0;i<first;i++){const el=document.createElement('div');el.className='cal-day';grid.appendChild(el);}
  for(let d=1;d<=total;d++){
    const el=document.createElement('div');
    const dt=new Date(calYear,calMonth,d);
    const k=dt.toDateString();
    const cnt=calDayMap[k]||0;
    if(cnt>0){
      el.className='cal-day active-day has-msgs'+(cnt===maxC?' high-day':'');
      el.title=cnt+' messages';
      el.addEventListener('click',()=>{
        grid.querySelectorAll('.cal-day').forEach(c=>c.classList.remove('selected'));
        el.classList.add('selected');
        setTimeout(()=>{closeCal();jumpToDate(k);},220);
      });
    } else {
      el.className='cal-day inactive';
    }
    if(dt.toDateString()===today.toDateString())el.classList.add('today-day');
    el.textContent=d;
    grid.appendChild(el);
  }
}

// ── JUMP HELPERS ──
function jumpToDate(dateStr){
  // Switch to messages tab
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-t="msgs"]').classList.add('active');
  posInd();
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-msgs').classList.add('active');
  document.getElementById('jump').style.display='';
  // Find first message on that date
  const target=ALL.find(m=>{try{return new Date(m.ts).toDateString()===dateStr;}catch{return false;}});
  if(!target)return;
  setTimeout(()=>{
    const ds=[...document.getElementById('msgs').querySelectorAll('.ds')];
    const fmt=new Date(dateStr).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
    const el=ds.find(d=>d.textContent===fmt||new Date(dateStr).toDateString()===dateStr);
    if(el){el.scrollIntoView({behavior:'smooth',block:'start'});
    el.style.color='var(--prose)';setTimeout(()=>{el.style.color='';},1800);}
    else{document.getElementById('msgs').scrollTop=0;}
  },80);
}

function jumpToMsg(ts){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-t="msgs"]').classList.add('active');
  posInd();
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-msgs').classList.add('active');
  document.getElementById('jump').style.display='';
  setTimeout(()=>{document.getElementById('msgs').scrollTop=0;},60);
}

load();
</script>
</body>
